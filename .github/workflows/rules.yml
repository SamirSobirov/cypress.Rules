name: Rules Monitoring

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:
    inputs:
      user_chat_id:
        description: 'ID чата для the Telegram notification'
        required: false
        default: ''

jobs:
  rules-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Cypress test for rules
        id: cypress
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/monitoring/rules.cy.js
          browser: chrome
        env:
          CYPRESS_LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          CYPRESS_LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}

      - name: Parse diagnostic data
        if: always()
        run: |
          if [ -f auth_api_status.txt ]; then
            RESULT=$(cat auth_api_status.txt | tr -d '[:space:]')
          else
            RESULT="UNKNOWN"
          fi

          S1="⏳"; S2="⏳"; S3="⏳"; S4="⏳"; S5="⏳"; STATUS="🔴 Failed"

          case "$RESULT" in
            "0") S1="❌"; STATUS="❌ UI Crash at Auth" ;;
            "1") S1="✅"; S2="❌"; STATUS="⚠️ Failed at Create folder" ;;
            "2") S1="✅"; S2="✅"; S3="❌"; STATUS="⚠️ Failed at Create subfolder" ;;
            "3") S1="✅"; S2="✅"; S3="✅"; S4="❌"; STATUS="⚠️ Failed at Create rule" ;;
            "4") S1="✅"; S2="✅"; S3="✅"; S4="✅"; S5="❌"; STATUS="⚠️ Failed at Delete rule" ;;
            "5") S1="✅"; S2="✅"; S3="✅"; S4="✅"; S5="✅"; STATUS="🟢 Success" ;;
            ERROR_*) S1="🆘 ${RESULT}"; STATUS="🔴 Auth API Error" ;;
            *) STATUS="❌ Unknown Failure / File Missing" ;;
          esac

          echo "S1=$S1" >> $GITHUB_ENV
          echo "S2=$S2" >> $GITHUB_ENV
          echo "S3=$S3" >> $GITHUB_ENV
          echo "S4=$S4" >> $GITHUB_ENV
          echo "S5=$S5" >> $GITHUB_ENV
          echo "FINAL_STATUS=$STATUS" >> $GITHUB_ENV

      - name: Upload Cypress screenshots & videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            cypress/screenshots/
            cypress/videos/
          if-no-files-found: ignore

      - name: Send Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: >-
            ${{ (github.event.inputs.user_chat_id != '') && github.event.inputs.user_chat_id || secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ github.event_name == 'schedule' && '📢 **Hourly Rules Monitoring**' || '👤 **Manual Rules Test**' }}

            📂 **Module:** Rules Management
            📊 **Status:** ${{ env.FINAL_STATUS }}

            **Flow Steps:**
            1. Create folder: ${{ env.S1 }}
            2. Create subfolder: ${{ env.S2 }}
            3. Create rule: ${{ env.S3 }}
            4. Delete rule: ${{ env.S4 }}
            5. Delete folder: ${{ env.S5 }}
